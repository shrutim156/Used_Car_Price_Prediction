<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict the price</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
    <body>
        <h1>Used Car Price Prediction</h1>
        <p>A website which predicts the selling price for your used car</p>
        
        <form action="/predict" method='POST'>

        <!--Section1-->
        <div id="vehicle_information" class="card">
            <h4>Vehicle Information</h4>
            <div class='grid-2'>
                <div class="form-group">
                <label for="model">Model:</label>
                <input type="text" placeholder="Enter Model Name" id="model" name="model">
                </div>
                <div class="form-group">        
                <label for="vehicle_age">Vehicle Age:</label>
                <input type="number" placeholder="Enter Vehicle Age" id="vehicle_age" name="vehicle_age">
                </div>
                <div class="form-group">
                <label for="km_driven">Kilometers Driven:</label>
                <input type="number" step="any" placeholder="Enter Kilometers Driven" id="km_driven" name="km_driven">
                </div>
            </div>
            
        </div>

        <!--Section2-->
        <div id="technical_specifications" class="card">
            <h4>Technical Specifications</h4>
            <div class='grid-3'>
                <div class="form-group">
                <label for="mileage">Mileage:</label>
                <input type="number" name='mileage' id='mileage' step="any" placeholder="Enter Mileage">
                </div>
                <div class="form-group"> 
                <label for="engine">Engine:</label>
                <input type="number" name='engine' id='engine' step="any" placeholder="Enter Engine">
                </div>
                <div class="form-group"> 
                <label for="max_power">Maximum Power:</label>
                <input type="number" name='max_power' id='max_power' step="any" placeholder="Enter Max Power">
                </div>
                <div class="form-group"> 
                <label for="seats">Seats</label>
                <select name="seats" id="seats">
                    <option value="">--Select--</option>
                    <option value="2">2</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                </select>
                </div>
                <div class="form-group"> 
                <label for="fuel_type">Fuel Type</label>
                <select name="fuel_type" id="fuel_type">
                    <option value="">--Select Fuel Type--</option>
                    <option value="Petrol">Petrol</option>
                    <option value="Diesel">Diesel</option>
                    <option value="CNG">CNG</option>
                    <option value="LPG">LPG</option>
                    <option value="Electric">Electric</option>
                </select>
                </div>
                <div class="form-group"> 
                <label for="transmission_type">Transmission Type:</label>
                <select name="transmission_type" id="transmission_type">
                    <option value="">--Select Transmission Type--</option>
                    <option value="Manual">Manual</option>
                    <option value="Automatic">Automatic</option>
                </select>
                </div>
            </div>
        </div>

        <!--Section3-->
        <div id="seller_configuration" class="card">
            <h4>Seller Configuration</h4>
            <div class='grid-1'>
            
                <div class="form-group"> 
                <label for="seller_type">Seller Type:</label>
                <select name="seller_type" id="seller_type">
                    <option value="">--Select Seller Type--</option>
                    <option value="Individual">Individual</option>
                    <option value="Dealer">Dealer</option>
                    <option value="Trustmark Dealer">Trustmark Dealer</option>
                </select>
                </div>
            </div>
            
        </div>    
            <button type="submit" class="btn">Submit</button>
        </form>

        
        
    </body>
</html>
