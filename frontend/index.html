<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict the price</title>
    <link rel="stylesheet" href="style.css">
</head>
    <body>
        <h1>Used Car Price Prediction</h1>
        <p>A website which predicts the selling price for your used car</p>
        
        <!--Section1-->
        <div id="vehicle_information" class="card">
            <h4>Vehicle Information</h4>
            <div>
            
            <form action="" class="grid-2">
                    <div class="form-group">
                    <label for="model">Model:</label>
                    <input type="text" placeholder="alto" id="model" name="model">
                    </div>
                    <div class="form-group">        
                    <label for="vage">Vehicle Age:</label>
                    <input type="number" placeholder="9" id="vage" name="vage">
                    </div>
                    <div class="form-group">
                    <label for="km_driven">Kilometers Driven:</label>
                    <input type="number" step="any" placeholder="11.69" id="km_driven" name="km_driven">
                    </div>
            </form>
            </div>
            
        </div>

        <!--Section2-->
        <div id="technical_specifications" class="card">
            <h4>Technical Specifications</h4>
            <div>
            <form action="" class="grid-3">
                    <div class="form-group">
                    <label for="mileage">Mileage:</label>
                    <input type="number" step="any" placeholder="19.70">
                    </div>
                    <div class="form-group"> 
                    <label for="engine">Engine:</label>
                    <input type="number" step="any" placeholder="1179">
                    </div>
                    <div class="form-group"> 
                    <label for="max_power">Maximum Power:</label>
                    <input type="number" step="any" placeholder="67.10">
                    </div>
                    <div class="form-group"> 
                    <label for="seats">Seats</label>
                    <select name="fuel" id="fuel">
                        <option value="">--Select--</option>
                        <option value="2">2</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                    </select>
                    </div>
                    <div class="form-group"> 
                    <label for="fuel">Fuel Type</label>
                    <select name="fuel" id="fuel">
                        <option value="">--Select Fuel Type--</option>
                        <option value="petrol">Petrol</option>
                        <option value="diesel">Diesel</option>
                        <option value="cng">CNG</option>
                        <option value="lpg">LPG</option>
                        <option value="electric">Electric</option>
                    </select>
                    </div>
                    <div class="form-group"> 
                    <label for="transmission">Transmission Type:</label>
                    <select name="transmission" id="transmission">
                        <option value="">--Select Transmission Type--</option>
                        <option value="manual">Manual</option>
                        <option value="automatic">Automatic</option>
                    </select>
                    </div>
                    
            </form>
            </div>
        </div>

        <!--Section3-->
        <div id="seller_configuration" class="card">
            <h4>Seller Configuration</h4>
            
            <form action="" class="grid-1">
                    <div class="form-group"> 
                    <label for="seller">Seller Type:</label>
                    <select name="seller" id="seller">
                        <option value="">--Select Seller Type--</option>
                        <option value="individual">Individual</option>
                        <option value="dealer">Dealer</option>
                        <option value="trustmark_dealer">Trustmark Dealer</option>
                    </select>
                    </div>
            </form>
            
        </div>    
            <button type="submit" class="btn">Submit</button>

        
    </body>
</html>
